import com.example.pomodoro2.standAlonePlugin.StandAlonePlugin

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-android-extensions'
apply plugin: 'kotlin-kapt'
apply plugin: 'dagger.hilt.android.plugin'
apply plugin: 'androidx.navigation.safeargs.kotlin'


android {

    compileSdkVersion Versions.compile_sdk_version
    buildToolsVersion Versions.build_tools_version


    defaultConfig {
        applicationId Versions.application_id
        minSdkVersion Versions.min_sdk_version
        targetSdkVersion Versions.target_sdk_version
        versionCode Versions.version_code
        versionName Versions.version_name

        testInstrumentationRunner Dependencies.test_runner
        vectorDrawables.useSupportLibrary = true
    }

    buildTypes {
        debug {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    //Data Binding
    buildFeatures.dataBinding true
    dataBinding {enabledForTests = true}


    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        languageVersion = "1.4"
        jvmTarget = '1.8'
    }

    packagingOptions {
        exclude 'META-INF/AL2.0'
        exclude 'META-INF/LGPL2.1'
    }

    // Always show the result of every unit test when running via command line, even if it passes.
    testOptions.unitTests {
        includeAndroidResources = true

        all {
            testLogging {
                events 'passed', 'skipped', 'failed', 'standardOut', 'standardError'
            }
        }
    }


    // If you need to add more flavors, consider using flavor dimensions.
    flavorDimensions "default"
    productFlavors {
        mock {
            dimension "default"
            applicationIdSuffix = ".mock"
        }
        prod {
            dimension "default"
        }
    }

    // Remove mockRelease as it's not needed.
    android.variantFilter { variant ->
        if (variant.buildType.name == 'release'
                && variant.getFlavors().get(0).name == 'mock') {
            variant.setIgnore(true)
        }
    }

}

sourceSets {
    test{
        java{
            srcDirs += "src/test/kotlin"
        }
    }
}

dependencies {
    //1. Application dependencies
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation project(':core')

    // Kotlin
    implementation Dependencies.kotlin_stdlib_jdk8

    // Android KTX
    implementation Dependencies.androidx_core_ktx
    // Coroutines
    implementation Dependencies.kotlinx_coroutines_core
    implementation Dependencies.kotlinx_coroutines_android

    // javax
    implementation Dependencies.jsr250_api
    implementation Dependencies.javax_inject

    // Support libraries
    implementation Dependencies.androidx_appcompat
    implementation Dependencies.androidx_fragment
    implementation Dependencies.material
    implementation Dependencies.androidx_constraintlayout
    implementation Dependencies.androidx_vectordrawable

    // Navigation
    implementation Dependencies.navigation_fragment
    implementation Dependencies.navigation_ui

    // ViewModel
    implementation Dependencies.lifecycle_viewmodel
    implementation Dependencies.lifecycle_viewmodel_ktx
    // LiveData

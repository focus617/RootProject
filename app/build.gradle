    // 3. Acceptance tests dependencies
    // Test Core library
    androidTestImplementation Dependencies.androidx_test_core

    // Coroutines
    //androidTestImplementation Dependencies.kotlinx_coroutines_core
    androidTestImplementation Dependencies.kotlinx_coroutines_test
    androidTestImplementation Dependencies.kotlinx_coroutines_android

    // AndroidJUnitRunner and JUnit Rules
    androidTestImplementation Dependencies.androidx_test_runner
    androidTestImplementation Dependencies.androidx_test_rules

    // Assertions
    androidTestImplementation Dependencies.androidx_test_ext_junit
    androidTestImplementation Dependencies.androidx_test_ext_truth
    androidTestImplementation Dependencies.google_truth

    // Mockito for Android
    //androidTestImplementation Dependencies.mockito_android

    // Espresso dependencies
    androidTestImplementation Dependencies.espresso_core
    androidTestImplementation Dependencies.espresso_contrib
    androidTestImplementation Dependencies.espresso_intents
    androidTestImplementation Dependencies.espresso_accessibility
    androidTestImplementation Dependencies.espresso_web
    androidTestImplementation Dependencies.idling_concurrent

    // Optional -- Hamcrest library
    androidTestImplementation Dependencies.hamcrest_library
